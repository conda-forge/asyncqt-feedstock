{% set name = "asyncqt" %}
{% set version = "0.8.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 07aa993c7a4b1d4edbd35acced44d1be01da149ba3f7c9a7fa984be4ceca883f

build:
  noarch: python
  number: 1
  script: '{{ PYTHON }} -m pip install . --no-deps --ignore-installed -vv '

requirements:
  host:
    - pip
    - python {{ python_min }}
    - setuptools
  run:
    - python >={{ python_min }}
  run_constrained:
    - pyside2
    - pyqt >=5

test:
  requires:
    - pyqt
    - python {{ python_min }}
  imports:
    - asyncqt

about:
  home: https://github.com/gmarull/asyncqt
  license: BSD
  license_family: BSD-3-Clause
  license_file: LICENSE
  summary: Implementation of the PEP 3156 Event-Loop with Qt.

extra:
  recipe-maintainers:
    - nicoddemus
